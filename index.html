  "🏥 Médico","⚡ Servicios","👨‍👩‍👧 Familiar","📱 Suscripción","📦 Otro"

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const MX = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2}).format(n||0);
function todayStr(){ return new Date().toISOString().split("T")[0]; }
function currentMonthKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }

function getCycleLabel(dateStr, cutDay) {
  if (!dateStr || !cutDay) return "current";
  const now   = new Date();
  const today = now.getDate();
  const date  = new Date(dateStr + "T12:00:00");
  let cycleStart, cycleEnd;
  if (today <= cutDay) {
    cycleEnd   = new Date(now.getFullYear(), now.getMonth(), cutDay);
    cycleStart = new Date(now.getFullYear(), now.getMonth() - 1, cutDay + 1);
  } else {
    cycleEnd   = new Date(now.getFullYear(), now.getMonth() + 1, cutDay);
    cycleStart = new Date(now.getFullYear(), now.getMonth(), cutDay + 1);
  }
  if (date >= cycleStart && date <= cycleEnd) return "current";
  if (date > cycleEnd) return "next";
  return "past";
}

function daysUntilPay(payDay) {
  const now  = new Date();
  let   next = new Date(now.getFullYear(), now.getMonth(), payDay);
  if (next <= now) next = new Date(now.getFullYear(), now.getMonth() + 1, payDay);
  return Math.ceil((next - now) / 86400000);
}

function daysUntilCut(cutDay) {
  const now  = new Date();
  let   next = new Date(now.getFullYear(), now.getMonth(), cutDay);
  if (next <= now) next = new Date(now.getFullYear(), now.getMonth() + 1, cutDay);
  return Math.ceil((next - now) / 86400000);
}

function fmtDate(str){
  if(!str) return "";
  const [y,m,d] = str.split("-");
  const M = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(d)} ${M[parseInt(m)-1]} ${y}`;
}

function monthKey(offset = 0) {
  const d = new Date();
  d.setMonth(d.getMonth() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function monthLabel(ym) {
  const [y, m] = ym.split("-");
  return `${MONTHS_ES[parseInt(m)-1]} ${y}`;
}

function useLS(key, init){
  const [v,setV] = useState(()=>{ try{ const s=localStorage.getItem(key); return s?JSON.parse(s):init; }catch{ return init; }});
  useEffect(()=>{ localStorage.setItem(key,JSON.stringify(v)); },[key,v]);
  return [v,setV];
}

// ─── MSI HELPERS ──────────────────────────────────────────
// Cada MSI tiene:
//   startMonth: "YYYY-MM"  → mes de la primera cuota
//   totalInstall: número total de cuotas
//   paidMonths: { "YYYY-MM": true }  → cuotas ya marcadas pagadas
function addMonths(ym, n) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function msiMonths(d) {
  const start = d.startMonth || currentMonthKey();
  return Array.from({length: d.totalInstall}, (_, i) => addMonths(start, i));
}
function msiPaidCount(d) { return Object.keys(d.paidMonths||{}).length; }
function msiRemainingAmt(d) {
  const paid = msiPaidCount(d);
  return (d.totalInstall - paid) * d.monthlyAmt;
}
function msiIsFullyPaid(d) { return msiPaidCount(d) >= d.totalInstall; }
// Retorna el primer mes de cuota no pagado
function msiNextUnpaidMonth(d) {
  if (msiIsFullyPaid(d)) return null;
  return msiMonths(d).find(ym => !(d.paidMonths||{})[ym]) || null;
}
function msiMonthPaid(d, ym) { return !!(d.paidMonths||{})[ym]; }

function healthScore(cards){
  if(!cards.length) return 100;
  const lim = cards.reduce((s,c)=>s+c.limit+(c.limitExt||0),0);
  if(!lim) return 100;
  const used = cards.reduce((s,c)=>{
    const g=(c.expenses||[]).filter(e=>!e.paid&&getCycleLabel(e.date,c.cutDay)==="current"&&!e.alreadyInBalance).reduce((a,e)=>a+e.amount,0);
    const m=(c.deferred||[]).filter(d=>!msiIsFullyPaid(d)&&!d.alreadyInBalance).reduce((a,d)=>a+d.monthlyAmt,0);
    return s+(c.limit+(c.limitExt||0)-(c.available||0))+g+m;
  },0);
  const p=used/lim;
  if(p<0.3) return 95; if(p<0.5) return 80; if(p<0.7) return 60; if(p<0.9) return 35; return 15;
}

function themeBg(theme) {
  if(theme.bg.length===3)
    return `linear-gradient(145deg, ${theme.bg[0]} 0%, ${theme.bg[1]} 55%, ${theme.bg[2]} 100%)`;
  return `linear-gradient(145deg, ${theme.bg[0]} 0%, ${theme.bg[1]} 100%)`;
}

const S = {
  inp: {
    display:"block", width:"100%", padding:"13px 15px", fontSize:15,
    background:"#F2F2F7", border:"none", borderRadius:13,

  card: { background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04)" },
  row:  { display:"flex", alignItems:"center", padding:"14px 16px", borderBottom:"1px solid #F2F2F7" },

function Field({label, children, hint}){
  return(
    <div style={{marginBottom:18}}>
      <label style={S.label}>{label}</label>
      {children}
      {hint && <p style={{color:"#8E8E93",fontSize:11,margin:"6px 0 0",lineHeight:1.5}}>{hint}</p>}
    </div>
  );
}

function Btn({children,onClick,variant="primary",full=false,small=false,style:sx={}}){
  const base={ padding:small?"9px 18px":"14px 0", border:"none", borderRadius:14, fontSize:small?14:16,
    fontWeight:700, cursor:"pointer", fontFamily:"inherit", width:full?"100%":"auto", flex:full?undefined:1,
    transition:"opacity 0.15s, transform 0.1s", ...sx };
  const t={ primary:{background:"#007AFF",color:"#fff"}, secondary:{background:"#F2F2F7",color:"#1C1C1E"},
    danger:{background:"#FF3B30",color:"#fff"}, purple:{background:"#AF52DE",color:"#fff"},
    green:{background:"#34C759",color:"#fff"}, teal:{background:"#32ADE6",color:"#fff"} };
  return(
    <button style={{...base,...t[variant]}} onClick={onClick}
      onMouseDown={e=>e.currentTarget.style.transform="scale(0.96)"}
      onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>{children}</button>
  );
}

function Modal({title, onClose, children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:300,
      display:"flex",alignItems:"flex-end",justifyContent:"center",
      backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}>
      <div style={{background:"#F2F2F7",borderRadius:"24px 24px 0 0",width:"100%",
        maxWidth:520,maxHeight:"93vh",overflowY:"auto",paddingBottom:48}}>
        <div style={{background:"#F2F2F7",position:"sticky",top:0,zIndex:1,
          display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"20px 20px 14px",borderBottom:"1px solid rgba(0,0,0,0.06)"}}>
          <span style={{fontSize:18,fontWeight:700,color:"#1C1C1E"}}>{title}</span>
          <button onClick={onClose} style={{background:"#E5E5EA",border:"none",color:"#1C1C1E",
            borderRadius:99,width:30,height:30,fontSize:17,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>×</button>
        </div>
        <div style={{padding:"20px 20px 0"}}>{children}</div>
      </div>
    </div>
  );
}

// ─── CARD FORM ────────────────────────────────────────────
function CardForm({initial, onSave, onClose, onDelete}){
  const [name,setName]       = useState(initial?.name||"");
  const [limit,setLimit]     = useState(initial?.limit||"");
  const [limitExt,setLE]     = useState(initial?.limitExt||"");
  const [available,setAvail] = useState(initial?.available||"");
  const [cutDay,setCut]      = useState(initial?.cutDay||"");
  const [payDay,setPay]      = useState(initial?.payDay||"");
  const [themeIdx,setTheme]  = useState(initial?.themeIdx??0);

  function save(){
    if(!name||!limit) return;
    const cut=parseInt(cutDay)||1;
    onSave({name,limit:parseFloat(limit),limitExt:parseFloat(limitExt)||0,
      available:parseFloat(available)||0,cutDay:cut,payDay:parseInt(payDay)||cut,themeIdx});
  }

  const theme=CARD_THEMES[themeIdx];
  return(
    <Modal title={initial?"Editar tarjeta":"Nueva tarjeta"} onClose={onClose}>
      {/* Preview + color picker */}
      <div style={{background:themeBg(theme),borderRadius:20,padding:"20px",marginBottom:20,
        boxShadow:`0 8px 32px ${theme.bg[0]}66`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-30,top:-30,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <p style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",margin:"0 0 4px"}}>Vista previa</p>
        <p style={{color:"#fff",fontSize:20,fontWeight:800,margin:"0 0 14px"}}>{name||"Mi Tarjeta"}</p>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {CARD_THEMES.map((t,i)=>(
            <div key={i} onClick={()=>setTheme(i)}
              style={{width:30,height:30,borderRadius:15,background:themeBg(t),cursor:"pointer",
                border:themeIdx===i?"3px solid #fff":"3px solid transparent",
                boxSizing:"border-box",transition:"all 0.15s",
                boxShadow:themeIdx===i?"0 0 0 2px rgba(0,0,0,0.3)":"none"}}/>
          ))}
        </div>
      </div>

      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:16}}>
        {[
          {l:"Nombre",val:name,set:setName,ph:"ej. BBVA Azul",type:"text"},
          {l:"Crédito total",val:limit,set:setLimit,ph:"47100",type:"number"},
          {l:"Extensión (opcional)",val:limitExt,set:setLE,ph:"0.00",type:"number"},
          {l:"Disponible actual",val:available,set:setAvail,ph:"ej. 34577.57",type:"number"},
        ].map((f,i,arr)=>(
          <div key={f.l} style={{padding:"13px 15px",borderBottom:i<arr.length-1?"1px solid #F2F2F7":"none"}}>
            <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 3px"}}>{f.l}</p>
            <input style={{display:"block",width:"100%",border:"none",outline:"none",fontSize:16,
              fontWeight:500,color:"#1C1C1E",fontFamily:"inherit",background:"transparent",
              padding:0,WebkitAppearance:"none"}}
              type={f.type} placeholder={f.ph} value={f.val} onChange={e=>f.set(e.target.value)}/>
          </div>
        ))}
      </div>

      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:20}}>
        {[
          {l:"✂️ Día de corte",ph:"ej. 10",val:cutDay,set:setCut,hint:"Cierra el ciclo"},
          {l:"💳 Día de pago", ph:"ej. 30",val:payDay,set:setPay,hint:"Límite sin intereses"},
        ].map((f,i)=>(
          <div key={f.l} style={{padding:"13px 15px",borderBottom:i===0?"1px solid #F2F2F7":"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 2px"}}>{f.l}</p>
                <p style={{color:"#C7C7CC",fontSize:10,margin:0}}>{f.hint}</p>
              </div>
              <input style={{width:60,border:"none",outline:"none",fontSize:16,fontWeight:700,
                color:"#1C1C1E",textAlign:"right",fontFamily:"inherit",
                background:"transparent",WebkitAppearance:"none"}}
                type="number" min="1" max="31" placeholder="—" value={f.val}
                onChange={e=>f.set(e.target.value)}/>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10}}>
        <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={save}>Guardar</Btn>
      </div>
      {initial&&<div style={{marginTop:10}}><Btn variant="danger" full onClick={onDelete}>Eliminar tarjeta</Btn></div>}
    </Modal>
  );
}

// ─── EXPENSE FORM ─────────────────────────────────────────
function ExpenseForm({onSave, onClose, cutDay}){
  const [desc,setDesc]   = useState("");
  const [amount,setAmt]  = useState("");
  const [date,setDate]   = useState(todayStr());
  const [cat,setCat]     = useState(CATEGORIES[12]);
  const [note,setNote]   = useState("");
  const [inBal,setInBal] = useState(false);
  const cycle = getCycleLabel(date, cutDay);

  return(
    <Modal title="Agregar gasto" onClose={onClose}>
      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:16}}>
        {[
          {l:"Descripción",val:desc,set:setDesc,ph:"ej. Soriana",type:"text"},
          {l:"Monto",val:amount,set:setAmt,ph:"214.22",type:"number"},
          {l:"Nota (opcional)",val:note,set:setNote,ph:"",type:"text"},
        ].map((f,i,arr)=>(
          <div key={f.l} style={{padding:"13px 15px",borderBottom:i<arr.length-1?"1px solid #F2F2F7":"none"}}>
            <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 3px"}}>{f.l}</p>
            <input style={{display:"block",width:"100%",border:"none",outline:"none",fontSize:16,
              fontWeight:500,color:"#1C1C1E",fontFamily:"inherit",background:"transparent",
              padding:0,WebkitAppearance:"none"}}
              type={f.type} placeholder={f.ph} value={f.val} onChange={e=>f.set(e.target.value)}/>
          </div>
        ))}
        <div style={{padding:"13px 15px",borderBottom:"1px solid #F2F2F7"}}>
          <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 6px"}}>Categoría</p>
          <select style={{display:"block",width:"100%",border:"none",outline:"none",fontSize:15,
            color:"#1C1C1E",fontFamily:"inherit",background:"transparent",WebkitAppearance:"none"}}
            value={cat} onChange={e=>setCat(e.target.value)}>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{padding:"13px 15px",borderBottom:"1px solid #F2F2F7"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 2px"}}>Fecha</p>
              {cycle==="next"&&<p style={{color:"#007AFF",fontSize:11,fontWeight:600,margin:0}}>⚡ Sig. ciclo</p>}
              {cycle==="past"&&<p style={{color:"#FF9F0A",fontSize:11,fontWeight:600,margin:0}}>⏮ Anterior</p>}
            </div>
            <input style={{border:"none",outline:"none",fontSize:15,color:"#1C1C1E",
              fontFamily:"inherit",background:"transparent",colorScheme:"light"}}
              type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          </div>
        </div>
        <div style={{padding:"13px 15px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{color:"#1C1C1E",fontSize:14,fontWeight:500,margin:"0 0 2px"}}>¿Ya en saldo del banco?</p>
              <p style={{color:"#8E8E93",fontSize:11,margin:0}}>Evita contarlo dos veces</p>
            </div>
            <div onClick={()=>setInBal(!inBal)}
              style={{width:52,height:30,borderRadius:15,background:inBal?"#34C759":"#E5E5EA",
                position:"relative",cursor:"pointer",transition:"background 0.25s",flexShrink:0}}>
              <div style={{position:"absolute",top:3,left:inBal?25:3,width:24,height:24,
                borderRadius:12,background:"#fff",boxShadow:"0 2px 6px rgba(0,0,0,0.2)",transition:"left 0.25s"}}/>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
        <Btn onClick={()=>{
          if(!desc||!amount) return;
          onSave({id:Date.now(),desc,amount:parseFloat(amount),date,cat,note,paid:false,alreadyInBalance:inBal});
        }}>Agregar</Btn>
      </div>
    </Modal>
  );
}

// ─── DEFERRED FORM ────────────────────────────────────────
function DeferredForm({onSave,onClose,initial}){
  const now = new Date();
  const defaultStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const [desc,setDesc]         = useState(initial?.desc||"");
  const [monthlyAmt,setAmt]    = useState(initial?.monthlyAmt||"");
  const [total,setTotal]       = useState(initial?.totalInstall||"");
  const [startMonth,setStart]  = useState(initial?.startMonth||defaultStart);
  const [inBal,setInBal]       = useState(initial?.alreadyInBalance??true);
  const isEdit = !!initial;

  // Cuotas ya pagadas = las que cayeron en meses <= hoy y están en paidMonths
  const previewMonths = (() => {
    if (!total || !startMonth) return [];
    return Array.from({length:parseInt(total)},(_,i)=>addMonths(startMonth,i));
  })();

  const totalDebt = parseFloat(monthlyAmt||0) * parseInt(total||0);

  return(
    <Modal title={isEdit?"Editar MSI":"Agregar MSI / Diferido"} onClose={onClose}>
      {!isEdit && monthlyAmt && total && (
        <div style={{background:"rgba(175,82,222,0.1)",borderRadius:14,padding:"13px 15px",marginBottom:14,border:"1px solid rgba(175,82,222,0.2)"}}>
          <p style={{color:"#8E8E93",fontSize:11,fontWeight:600,margin:"0 0 3px"}}>DEUDA TOTAL DEL MSI</p>
          <p style={{color:"#AF52DE",fontSize:22,fontWeight:800,margin:0}}>{MX(totalDebt)}</p>
          <p style={{color:"#8E8E93",fontSize:12,margin:"3px 0 0"}}>{total} pagos de {MX(parseFloat(monthlyAmt||0))}</p>
          {previewMonths.length>0&&(
            <p style={{color:"#8E8E93",fontSize:11,margin:"4px 0 0"}}>
              Primera cuota: <b style={{color:"#AF52DE"}}>{monthLabel(previewMonths[0])}</b>
              {" · "}Última: <b style={{color:"#AF52DE"}}>{monthLabel(previewMonths[previewMonths.length-1])}</b>
            </p>
          )}
        </div>
      )}

      <div style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"13px 15px",borderBottom:"1px solid #F2F2F7"}}>

// Selector de meses pasados ya pagados
function PastMonthsPicker({months, onChange}){
  const [sel,setSel] = useState([]);
  const toggle = ym => {
    const next = sel.includes(ym) ? sel.filter(m=>m!==ym) : [...sel,ym];
    setSel(next);
    onChange(next);
  };
  return(
    <div style={{padding:"10px 15px",display:"flex",gap:6,flexWrap:"wrap"}}>
      {months.map(ym=>{
        const on = sel.includes(ym);
        return(
          <div key={ym} onClick={()=>toggle(ym)}
            style={{borderRadius:10,padding:"6px 12px",cursor:"pointer",transition:"all 0.15s",
              background:on?"#AF52DE":"#F2F2F7",color:on?"#fff":"#636366",
              fontSize:12,fontWeight:700}}>
            {monthLabel(ym)}
          </div>
        );
      })}
    </div>
  );
}

// ─── FUTURE DEBTS VIEW ────────────────────────────────────
function DebtsView({debts,onAdd,onDelete,onTogglePaid}){
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const months=Array.from({length:6},(_,i)=>({ym:monthKey(i),label:monthLabel(monthKey(i))}));

  function debtAppearsIn(debt,ym){
    if(!debt.recurring) return debt.yearMonth===ym;
    const[sy,sm]=debt.yearMonth.split("-").map(Number);
    const[ty,tm]=ym.split("-").map(Number);
    const off=(ty*12+tm)-(sy*12+sm);
    if(off<0) return false;
    if(debt.recurMonths&&off>=debt.recurMonths) return false;
    return true;
  }
  function monthTotal(ym){
    return debts.reduce((s,d)=>{
      if(!debtAppearsIn(d,ym)) return s;
      const p=d.paidMonths?.[ym]||(ym===d.yearMonth&&d.paid);
      return s+(p?0:d.amount);
    },0);
  }
  const currentYM=monthKey(0);
  const debtAlert=debts.filter(d=>{
    if(!debtAppearsIn(d,currentYM)) return false;
    return!(d.paidMonths?.[currentYM]||(currentYM===d.yearMonth&&d.paid));
  }).length;

  return(
    <div style={{minHeight:"100vh",background:"#F2F2F7",fontFamily:"'SF Pro Text',-apple-system,sans-serif",paddingBottom:120}}>
      <div style={{background:"#fff",padding:"52px 20px 18px",borderBottom:"1px solid #E5E5EA"}}>

        </div>
        {debts.length>0&&(
          <div style={{display:"flex",gap:8,marginTop:16}}>
            {[
              {l:"ESTE MES",v:MX(monthTotal(currentYM)),c:"#FF3B30"},
              {l:"PENDIENTES",v:`${debtAlert} pagos`,c:"#FF9F0A"},
              {l:"PRÓX. 6 MESES",v:MX(months.reduce((s,{ym})=>s+monthTotal(ym),0)),c:"#007AFF"},
            ].map(s=>(
              <div key={s.l} style={{flex:1,background:"#F2F2F7",borderRadius:13,padding:"10px 11px"}}>
                <p style={{color:"#8E8E93",fontSize:9,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 3px"}}>{s.l}</p>
                <p style={{color:s.c,fontSize:13,fontWeight:800,margin:0}}>{s.v}</p>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{padding:"16px"}}>
        {debts.length===0?(
          <div style={{textAlign:"center",padding:"80px 24px 0"}}>
            <p style={{fontSize:52,margin:"0 0 12px"}}>📅</p>
            <p style={{fontSize:19,fontWeight:700,color:"#3A3A3C",margin:"0 0 8px"}}>Sin compromisos</p>
            <p style={{fontSize:14,color:"#8E8E93",lineHeight:1.6,margin:0}}>Registra préstamos, rentas y pagos futuros</p>
          </div>
        ):months.map(({ym,label})=>{
          const items=debts.filter(d=>debtAppearsIn(d,ym));
          if(!items.length) return null;
          const total=monthTotal(ym);
          return(
            <div key={ym} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"0 4px 8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <p style={{color:ym===currentYM?"#1C1C1E":"#8E8E93",fontSize:13,fontWeight:700,letterSpacing:0.4,textTransform:"uppercase",margin:0}}>{label}</p>
                  {ym===currentYM&&<span style={{fontSize:10,fontWeight:700,color:"#007AFF",background:"rgba(0,122,255,0.1)",borderRadius:6,padding:"2px 7px"}}>HOY</span>}
                </div>
                <p style={{color:total===0?"#34C759":"#FF3B30",fontSize:14,fontWeight:800,margin:0}}>{total===0?"✓ Al día":MX(total)}</p>
              </div>
              <div style={S.card}>
                {items.map((debt,i)=>{
                  const isPaid=debt.paidMonths?.[ym]||(ym===debt.yearMonth&&debt.paid);
                  return(
                    <div key={`${debt.id}-${ym}`} style={{...S.row,borderBottom:i<items.length-1?"1px solid #F2F2F7":"none",opacity:isPaid?0.5:1,transition:"opacity 0.2s"}}>
                      <div onClick={()=>onTogglePaid(debt.id,ym)}
                        style={{width:26,height:26,borderRadius:13,flexShrink:0,
                          border:isPaid?"none":"2px solid #D1D1D6",background:isPaid?"#34C759":"transparent",
                          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginRight:14,transition:"all 0.2s"}}>
                        {isPaid&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <p style={{color:"#1C1C1E",fontSize:14,fontWeight:600,margin:0,textDecoration:isPaid?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{debt.desc}</p>
                          {debt.recurring&&(
                            <span style={{fontSize:9,fontWeight:700,color:"#007AFF",background:"rgba(0,122,255,0.1)",borderRadius:4,padding:"1px 5px",flexShrink:0}}>
                              {debt.recurMonths?(()=>{const[sy,sm]=debt.yearMonth.split("-").map(Number);const[ty,tm]=ym.split("-").map(Number);return`${(ty*12+tm)-(sy*12+sm)+1}/${debt.recurMonths}`;})():"∞"}
                            </span>
                          )}
                        </div>
                        <p style={{color:"#8E8E93",fontSize:11,margin:"2px 0 0"}}>{debt.cat}{debt.note?` · ${debt.note}`:""}</p>
                      </div>
                      <p style={{color:isPaid?"#8E8E93":"#1C1C1E",fontSize:15,fontWeight:700,margin:"0 8px",flexShrink:0,textDecoration:isPaid?"line-through":"none"}}>{MX(debt.amount)}</p>
                      {(ym===debt.yearMonth||debt.recurring)&&(
                        <button onClick={()=>{setEditing(debt);setShowForm(true);}}
                          style={{background:"none",border:"none",color:"#8E8E93",cursor:"pointer",fontSize:16,padding:"0 0 0 4px",lineHeight:1}}>✎</button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      {showForm&&(
        <DebtForm initial={editing}
          onSave={data=>{onAdd(data);setShowForm(false);setEditing(null);}}
          onClose={()=>{setShowForm(false);setEditing(null);}}
          onDelete={()=>{if(editing)onDelete(editing.id);setShowForm(false);setEditing(null);}}/>
      )}
    </div>
  );
}

// ─── CARD DETAIL ──────────────────────────────────────────
function CardDetail({card, onBack, onUpdate, onDelete}){
  const theme   = CARD_THEMES[card.themeIdx??0];
  const cutDay  = card.cutDay||1;
  const payDay  = card.payDay||cutDay;

  const [showExpForm,  setShowExpForm]  = useState(false);
  const [showDefForm,  setShowDefForm]  = useState(false);
  const [showEditForm, setShowEditForm] = useState(false);
  const [editingMSI,   setEditingMSI]  = useState(null);
  const [tab,   setTab]   = useState("gastos");
  const [search,setSearch]= useState("");

  const expenses = card.expenses||[];
  const deferred = card.deferred||[];

  const currentCycleExp = expenses.filter(e=>!e.paid&&getCycleLabel(e.date,cutDay)==="current"&&!e.alreadyInBalance);
  const totalNewExpenses = currentCycleExp.reduce((s,e)=>s+e.amount,0);
  const msiExtra = deferred.filter(d=>!msiIsFullyPaid(d)&&!d.alreadyInBalance).reduce((s,d)=>s+d.monthlyAmt,0);
  const realAvailable = (card.available||0) - totalNewExpenses - msiExtra;
  const totalLimit = card.limit+(card.limitExt||0);
  const pct = Math.min(100,Math.max(0,((totalLimit-realAvailable)/totalLimit)*100));

  // A PAGAR = gastos ciclo actual + cuota MSI de este mes
  const toPayExp = expenses.filter(e=>!e.paid&&getCycleLabel(e.date,cutDay)==="current").reduce((s,e)=>s+e.amount,0);
  const toPayMSI = deferred.filter(d=>!msiIsFullyPaid(d)).reduce((s,d)=>s+d.monthlyAmt,0);
  const toPay = toPayExp + toPayMSI;

  const daysToPayment = daysUntilPay(payDay);
  const daysToCut     = daysUntilCut(cutDay);
  const barColor = pct>85?"#FF3B30":pct>65?"#FF9F0A":theme.bar;
  const nextCycleTotal = expenses.filter(e=>!e.paid&&getCycleLabel(e.date,cutDay)==="next").reduce((s,e)=>s+e.amount,0);

  const filtered    = search.trim() ? expenses.filter(e=>e.desc.toLowerCase().includes(search.toLowerCase())||e.cat?.toLowerCase().includes(search.toLowerCase())) : expenses;
  const grouped     = filtered.reduce((acc,e)=>{if(!acc[e.date])acc[e.date]=[];acc[e.date].push(e);return acc;},{});
  const sortedDates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const catTotals   = CATEGORIES.map(cat=>({cat,total:expenses.filter(e=>e.cat===cat&&!e.paid&&getCycleLabel(e.date,cutDay)==="current").reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  const toggleExp = id => {
    const exp=expenses.find(e=>e.id===id); if(!exp) return;
    const delta=exp.paid?-exp.amount:exp.amount;
    onUpdate({...card,available:(card.available||0)+delta,expenses:expenses.map(e=>e.id===id?{...e,paid:!e.paid}:e)});
  };
  const deleteExp = id => onUpdate({...card,expenses:expenses.filter(e=>e.id!==id)});

  // ── MSI toggle: marca el siguiente mes pendiente, o lo desmarca ──
  const toggleDef = (id, forceYm) => {
    const def=deferred.find(d=>d.id===id); if(!def) return;
    const ym = forceYm || msiNextUnpaidMonth(def);
    if(!ym) return;
    const wasPaid = msiMonthPaid(def, ym);
    const delta = wasPaid ? -def.monthlyAmt : def.monthlyAmt;
    const newPM={...(def.paidMonths||{})};
    if(wasPaid) delete newPM[ym]; else newPM[ym]=true;
    onUpdate({
      ...card,
      available:(card.available||0)+delta,
      deferred:deferred.map(d=>d.id===id?{...d,paidMonths:newPM}:d)
    });
  };

  const saveMSI = (data) => {
    if(data===null){
      // delete
      onUpdate({...card,deferred:deferred.filter(d=>d.id!==editingMSI.id)});
    } else {
      onUpdate({...card,deferred:deferred.map(d=>d.id===data.id?{...d,...data}:d)});
    }
    setEditingMSI(null);
  };

  const resetMonth = () => {
    if(!window.confirm("¿Iniciar nuevo ciclo? Se eliminarán gastos pagados y se avanza el ciclo.")) return;
    onUpdate({...card,expenses:expenses.filter(e=>!e.paid||getCycleLabel(e.date,cutDay)==="next")});
  };

  return(
    <div style={{minHeight:"100vh",background:"#F2F2F7",fontFamily:"'SF Pro Text',-apple-system,sans-serif"}}>

      {/* HEADER */}
      <div style={{background:themeBg(theme),padding:"52px 20px 24px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-60,top:-60,width:220,height:220,borderRadius:"50%",background:"rgba(255,255,255,0.05)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",left:-40,bottom:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.04)",pointerEvents:"none"}}/>

        <button onClick={onBack} style={{background:"none",border:"none",color:theme.bar,fontSize:15,fontWeight:700,cursor:"pointer",padding:0,marginBottom:20,display:"flex",alignItems:"center",gap:4,position:"relative",zIndex:1}}>
          ‹ Mis tarjetas
        </button>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
          <div>
            <p style={{color:"rgba(255,255,255,0.45)",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",margin:"0 0 4px"}}>Tarjeta de crédito</p>
            <h2 style={{color:"#fff",fontSize:26,fontWeight:800,margin:0,letterSpacing:-0.3}}>{card.name}</h2>
          </div>
          <button onClick={()=>setShowEditForm(true)}
            style={{background:"rgba(255,255,255,0.18)",border:"none",color:"#fff",borderRadius:12,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0}}>
            Editar
          </button>
        </div>

        {/* A PAGAR — protagonista */}
        <div style={{marginTop:20,position:"relative",zIndex:1}}>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:12,margin:"0 0 2px"}}>Total a pagar este ciclo</p>
          <p style={{color:toPay>0?"#FF453A":"#30D158",fontSize:40,fontWeight:800,margin:"0 0 2px",letterSpacing:-1.5}}>{MX(toPay)}</p>
          <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:0}}>
            Disponible real: <span style={{color:realAvailable<0?"#FF453A":theme.bar,fontWeight:700}}>{MX(realAvailable)}</span>
          </p>
        </div>

        {/* Usage bar */}
        <div style={{background:"rgba(255,255,255,0.15)",borderRadius:99,height:5,marginTop:14,position:"relative",zIndex:1}}>
          <div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:barColor,transition:"width 0.6s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,position:"relative",zIndex:1}}>
          <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,margin:0}}>{pct.toFixed(0)}% utilizado</p>
          <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,margin:0}}>{MX(totalLimit)}</p>
        </div>

        {/* Stats pills */}
        <div style={{display:"flex",gap:8,marginTop:14,position:"relative",zIndex:1}}>
          {[
            {l:"GASTOS CICLO",v:MX(totalNewExpenses),c:"rgba(255,255,255,0.9)"},
            {l:"CUOTAS MSI",  v:MX(toPayMSI),        c:theme.bar},
            {l:"CRÉDITO TOTAL",v:MX(totalLimit),      c:"rgba(255,255,255,0.6)"},
          ].map(s=>(
            <div key={s.l} style={{flex:1,background:"rgba(255,255,255,0.1)",borderRadius:13,padding:"10px 11px"}}>
              <p style={{color:"rgba(255,255,255,0.45)",fontSize:9,fontWeight:700,letterSpacing:0.4,margin:"0 0 3px",textTransform:"uppercase"}}>{s.l}</p>
              <p style={{color:s.c,fontSize:13,fontWeight:800,margin:0}}>{s.v}</p>
            </div>
          ))}
        </div>

        {/* Cut / Pay dates */}
        <div style={{display:"flex",gap:8,marginTop:8,position:"relative",zIndex:1}}>
          {[
            {l:"✂️ Corte",day:cutDay,days:daysToCut,urgent:daysToCut<=3},
            {l:"💳 Pago",day:payDay,days:daysToPayment,urgent:daysToPayment<=5},
          ].map(f=>(
            <div key={f.l} style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:13,padding:"10px 12px"}}>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:9,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 2px"}}>{f.l}</p>
              <p style={{color:"rgba(255,255,255,0.9)",fontSize:13,fontWeight:700,margin:0}}>
                Día {f.day}<span style={{color:f.urgent?"#FF453A":theme.bar,fontSize:11,marginLeft:6}}>{f.days===0?"¡Hoy!":`en ${f.days}d`}</span>
              </p>
            </div>
          ))}
        </div>

        {nextCycleTotal>0&&(
          <div style={{marginTop:8,background:"rgba(0,122,255,0.2)",border:"1px solid rgba(0,122,255,0.3)",borderRadius:12,padding:"9px 13px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:1}}>
            <span style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>⚡ Sig. ciclo</span>
            <span style={{color:"#4FC3F7",fontSize:13,fontWeight:700}}>{MX(nextCycleTotal)}</span>
          </div>
        )}
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #E5E5EA",position:"sticky",top:0,zIndex:50}}>
        {[["gastos","Gastos"],["diferidos","MSI"],["categorias","Categorías"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"14px 0",background:"none",border:"none",color:tab===k?"#007AFF":"#8E8E93",
              fontSize:13,fontWeight:tab===k?700:500,cursor:"pointer",
              borderBottom:tab===k?"2.5px solid #007AFF":"2.5px solid transparent",transition:"all 0.15s"}}>
            {l}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px 16px 120px",minHeight:400}}>

        {/* GASTOS */}
        {tab==="gastos"&&(
          <>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
              <input style={{...S.inp,flex:1,fontSize:14,padding:"11px 14px"}}
                placeholder="🔍  Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <Btn small onClick={()=>setShowExpForm(true)}>+ Gasto</Btn>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <div style={{flex:1,background:"#fff",borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <p style={{color:"#8E8E93",fontSize:10,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 3px"}}>Este ciclo</p>
                <p style={{color:"#1C1C1E",fontSize:16,fontWeight:800,margin:0}}>{MX(totalNewExpenses)}</p>
              </div>
              <div style={{flex:1,background:"#fff",borderRadius:14,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                <p style={{color:"#8E8E93",fontSize:10,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 3px"}}>Pagados</p>
                <p style={{color:"#34C759",fontSize:16,fontWeight:800,margin:0}}>{MX(expenses.filter(e=>e.paid).reduce((s,e)=>s+e.amount,0))}</p>
              </div>
            </div>
            {sortedDates.length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <p style={{fontSize:44,margin:"0 0 8px"}}>🧾</p>
                <p style={{fontSize:15,color:"#8E8E93"}}>{search?"Sin resultados":"Sin gastos registrados"}</p>
              </div>
            ):sortedDates.map(date=>{
              const cycle=getCycleLabel(date,cutDay);
              return(
                <div key={date}>
                  <div style={{display:"flex",alignItems:"center",margin:"18px 4px 8px",gap:6}}>
                    <p style={{color:"#8E8E93",fontSize:11,fontWeight:700,letterSpacing:0.7,textTransform:"uppercase",margin:0}}>{fmtDate(date)}</p>
                    <CycleBadge cycle={cycle}/>
                  </div>
                  <div style={S.card}>
                    {grouped[date].map((exp,i)=>(
                      <div key={exp.id} style={{...S.row,borderBottom:i<grouped[date].length-1?"1px solid #F2F2F7":"none",opacity:exp.paid?0.45:1,transition:"opacity 0.2s"}}>
                        <div onClick={()=>toggleExp(exp.id)}
                          style={{width:26,height:26,borderRadius:13,flexShrink:0,border:exp.paid?"none":"2px solid #D1D1D6",background:exp.paid?"#34C759":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginRight:14,transition:"all 0.2s"}}>
                          {exp.paid&&<span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <p style={{color:"#1C1C1E",fontSize:15,fontWeight:600,margin:0,textDecoration:exp.paid?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{exp.desc}</p>
                            {exp.alreadyInBalance&&<span style={{fontSize:9,fontWeight:700,color:"#34C759",background:"rgba(52,199,89,0.12)",borderRadius:4,padding:"1px 5px",flexShrink:0}}>En saldo</span>}
                          </div>
                          <p style={{color:"#8E8E93",fontSize:12,margin:"2px 0 0"}}>{exp.cat}{exp.note?` · ${exp.note}`:""}</p>
                        </div>
                        <p style={{color:exp.paid?"#8E8E93":"#1C1C1E",fontSize:15,fontWeight:700,margin:"0 12px 0 8px",flexShrink:0,textDecoration:exp.paid?"line-through":"none"}}>{MX(exp.amount)}</p>
                        <button onClick={()=>deleteExp(exp.id)}
                          style={{background:"rgba(255,59,48,0.1)",border:"none",color:"#FF3B30",cursor:"pointer",fontSize:16,padding:"5px 8px",lineHeight:1,flexShrink:0,borderRadius:8,fontWeight:700}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            {expenses.length>0&&(
              <div style={{marginTop:28,textAlign:"center"}}>
                <button onClick={resetMonth}
                  style={{background:"#fff",border:"none",color:"#8E8E93",borderRadius:14,padding:"12px 24px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                  🔄 Iniciar nuevo ciclo
                </button>
              </div>
            )}
          </>
        )}

        {/* MSI / DIFERIDOS — nuevo diseño con progreso real */}
        {tab==="diferidos"&&(
          <>
            {/* Resumen total MSI */}
            {deferred.filter(d=>!msiIsFullyPaid(d)).length>0&&(
              <div style={{background:"linear-gradient(135deg,#2A1A3A,#5e2d8e)",borderRadius:18,padding:"16px 18px",marginBottom:14,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",right:-20,top:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
                <p style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",margin:"0 0 3px"}}>Deuda total en MSI</p>
                <p style={{color:"#BF5AF2",fontSize:28,fontWeight:800,margin:"0 0 2px",letterSpacing:-0.5}}>
                  {MX(deferred.filter(d=>!msiIsFullyPaid(d)).reduce((s,d)=>s+msiRemainingAmt(d),0))}
                </p>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:0}}>
                  {deferred.filter(d=>!msiIsFullyPaid(d)).length} plan{deferred.filter(d=>!msiIsFullyPaid(d)).length!==1?"es":""} activo{deferred.filter(d=>!msiIsFullyPaid(d)).length!==1?"s":""} · cuota total este mes: <span style={{color:"#BF5AF2",fontWeight:700}}>{MX(toPayMSI)}</span>
                </p>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              <Btn small variant="purple" onClick={()=>{setEditingMSI(null);setShowDefForm(true);}}>+ MSI</Btn>
            </div>

            {deferred.length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <p style={{fontSize:44,margin:"0 0 8px"}}>🔁</p>
                <p style={{fontSize:15,color:"#8E8E93"}}>Sin diferidos registrados</p>
              </div>
            ):deferred.map(d=>{
              const paid       = msiPaidCount(d);
              const remaining  = d.totalInstall - paid;
              const fullyPaid  = msiIsFullyPaid(d);
              const progPct    = (paid/d.totalInstall)*100;
              const remainingAmt = msiRemainingAmt(d);

              return(
                <div key={d.id} style={{background:"#fff",borderRadius:18,marginBottom:12,overflow:"hidden",
                  boxShadow:"0 1px 3px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04)",
                  opacity:fullyPaid?0.55:1,transition:"opacity 0.3s"}}>

                  {/* Header row */}
                  <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #F2F2F7"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                      <div style={{flex:1,minWidth:0}}>
                        {d.desc&&<p style={{color:"#8E8E93",fontSize:12,fontWeight:500,margin:"0 0 2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.desc}</p>}
                        <p style={{color:"#1C1C1E",fontSize:20,fontWeight:800,margin:0,letterSpacing:-0.3}}>{MX(d.monthlyAmt)}<span style={{color:"#8E8E93",fontSize:13,fontWeight:500}}>/mes</span></p>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,marginLeft:10}}>
                        {!fullyPaid&&(
                          <span style={{fontSize:10,fontWeight:700,
                            color:d.alreadyInBalance?"#34C759":"#FF9F0A",
                            background:d.alreadyInBalance?"rgba(52,199,89,0.12)":"rgba(255,159,10,0.12)",
                            borderRadius:6,padding:"3px 7px"}}>
                            {d.alreadyInBalance?"En saldo":"Extra"}
                          </span>
                        )}
                        {fullyPaid&&<span style={{fontSize:10,fontWeight:700,color:"#34C759",background:"rgba(52,199,89,0.12)",borderRadius:6,padding:"3px 7px"}}>✓ PAGADO</span>}
                        <button onClick={()=>{setEditingMSI(d);setShowDefForm(true);}}
                          style={{background:"#F2F2F7",border:"none",color:"#636366",cursor:"pointer",fontSize:13,padding:"5px 10px",borderRadius:8,fontWeight:600}}>✎</button>
                      </div>
                    </div>
                  </div>

                  {/* Progress bar */}
                  <div style={{padding:"12px 16px",borderBottom:"1px solid #F2F2F7"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{color:"#636366",fontSize:12,fontWeight:600}}>{paid} de {d.totalInstall} cuotas pagadas</span>
                      <span style={{color:fullyPaid?"#34C759":"#AF52DE",fontSize:12,fontWeight:700}}>{remaining} restante{remaining!==1?"s":""}</span>
                    </div>
                    <div style={{background:"#F2F2F7",borderRadius:99,height:8,overflow:"hidden"}}>
                      <div style={{width:`${progPct}%`,height:"100%",borderRadius:99,
                        background:fullyPaid?"#34C759":"linear-gradient(90deg,#AF52DE,#BF5AF2)",
                        transition:"width 0.6s ease"}}/>
                    </div>
                    {!fullyPaid&&(
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                        <span style={{color:"#8E8E93",fontSize:11}}>Pagado: <b style={{color:"#34C759"}}>{MX(paid*d.monthlyAmt)}</b></span>
                        <span style={{color:"#8E8E93",fontSize:11}}>Pendiente: <b style={{color:"#FF453A"}}>{MX(remainingAmt)}</b></span>
                      </div>
                    )}
                  </div>

                  {/* Lista de todas las cuotas con su mes */}
                  {!fullyPaid&&(
                    <div>
                      {msiMonths(d).map((ym,idx)=>{
                        const isPaid = msiMonthPaid(d,ym);
                        const isNext = !isPaid && msiMonths(d).slice(0,idx).every(m=>msiMonthPaid(d,m));
                        const nowYM  = currentMonthKey();
                        const isFuture = ym > nowYM;
                        return(
                          <div key={ym} style={{padding:"11px 16px",display:"flex",alignItems:"center",
                            justifyContent:"space-between",borderTop:"1px solid #F2F2F7",
                            opacity:isFuture&&!isNext?0.45:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div onClick={()=>toggleDef(d.id,ym)}
                                style={{width:26,height:26,borderRadius:13,flexShrink:0,
                                  border:isPaid?"none":"2px solid #D1D1D6",
                                  background:isPaid?"#34C759":isNext?"rgba(175,82,222,0.12)":"transparent",
                                  cursor:"pointer",display:"flex",alignItems:"center",
                                  justifyContent:"center",transition:"all 0.2s",
                                  boxShadow:isPaid?"0 2px 6px rgba(52,199,89,0.35)":isNext?"0 0 0 2px rgba(175,82,222,0.3)":"none"}}>
                                {isPaid&&<span style={{color:"#fff",fontSize:13,fontWeight:800}}>✓</span>}
                                {isNext&&!isPaid&&<span style={{color:"#AF52DE",fontSize:11,fontWeight:800}}>·</span>}
                              </div>
                              <div>
                                <p style={{color:isPaid?"#8E8E93":"#1C1C1E",fontSize:13,fontWeight:600,margin:0,
                                  textDecoration:isPaid?"line-through":"none"}}>
                                  Cuota {idx+1} · {monthLabel(ym)}
                                </p>
                                {isNext&&<p style={{color:"#AF52DE",fontSize:10,fontWeight:700,margin:"1px 0 0"}}>← pendiente</p>}
                              </div>
                            </div>
                            <p style={{color:isPaid?"#8E8E93":"#1C1C1E",fontSize:13,fontWeight:700,margin:0,
                              textDecoration:isPaid?"line-through":"none"}}>{MX(d.monthlyAmt)}</p>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {/* CATEGORÍAS */}
        {tab==="categorias"&&(
          <>
            <p style={{color:"#8E8E93",fontSize:13,margin:"0 0 14px"}}>Ciclo actual por categoría</p>
            {catTotals.length===0?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <p style={{fontSize:44,margin:"0 0 8px"}}>📊</p>
                <p style={{fontSize:15,color:"#8E8E93"}}>Sin datos aún</p>
              </div>
            ):catTotals.map(({cat,total})=>{
              const p=(total/Math.max(totalNewExpenses,1))*100;
              return(
                <div key={cat} style={{...S.card,marginBottom:8,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{color:"#1C1C1E",fontSize:14,fontWeight:600}}>{cat}</span>
                    <span style={{color:"#007AFF",fontSize:14,fontWeight:700}}>{MX(total)}</span>
                  </div>
                  <div style={{background:"#F2F2F7",borderRadius:99,height:6}}>
                    <div style={{width:`${p}%`,height:"100%",borderRadius:99,background:"#007AFF",transition:"width 0.5s ease"}}/>
                  </div>
                  <p style={{color:"#C7C7CC",fontSize:11,margin:"5px 0 0",textAlign:"right"}}>{p.toFixed(0)}%</p>
                </div>
              );
            })}
          </>
        )}
      </div>

      {showExpForm&&<ExpenseForm cutDay={cutDay}
        onSave={exp=>{onUpdate({...card,expenses:[...(card.expenses||[]),exp]});setShowExpForm(false);}}
        onClose={()=>setShowExpForm(false)}/>}

      {showDefForm&&<DeferredForm initial={editingMSI}
        onSave={d=>{
          if(!editingMSI){onUpdate({...card,deferred:[...(card.deferred||[]),d]});}
          else {saveMSI(d);}
          setShowDefForm(false);setEditingMSI(null);
        }}
        onClose={()=>{setShowDefForm(false);setEditingMSI(null);}}/>}

      {showEditForm&&(
        <CardForm initial={card}
          onSave={data=>{onUpdate({...card,...data});setShowEditForm(false);}}
          onClose={()=>setShowEditForm(false)}
          onDelete={()=>onDelete(card.id)}/>
      )}
    </div>
  );
}


// ─── RESUMEN VIEW ─────────────────────────────────────────
function ResumenView({history, income, onSetIncome, cards, debts, currentYM}){
  const [editingIncome, setEditingIncome] = useState(false);
  const [incomeInput, setIncomeInput]     = useState(income||"");

  // Build last 6 months of data
  const months = Array.from({length:6},(_,i)=>monthKey(-(5-i)));
  const histData = months.map(ym=>{
    const h = history[ym]||{expenses:0,msi:0,debts:0,income:0};
    const total = h.expenses + h.msi + h.debts;
    return { ym, label:monthLabel(ym).split(" ")[0], ...h, total };
  });

  const maxVal = Math.max(...histData.map(d=>Math.max(d.total, d.income||0)), 1);

  // Current month calcs
  const cur       = histData[histData.length-1];
  const eff_income = income || cur.income || 0;
  const totalCost  = cur.total;
  const margen     = eff_income - totalCost;
  const pctUsed    = eff_income>0 ? Math.min(100,(totalCost/eff_income)*100) : 0;
  const alcanza    = eff_income > 0 && margen >= 0;

  // Trend: compare last 2 months
  const prev  = histData[histData.length-2];
  const trend = cur.total - prev.total;

  function saveIncome(){
    onSetIncome(parseFloat(incomeInput)||0);
    setEditingIncome(false);
  }

  const BAR_H = 140;

  return(
    <div style={{minHeight:"100vh",background:"#F2F2F7",fontFamily:"'SF Pro Text',-apple-system,sans-serif",paddingBottom:120}}>

      {/* Header */}
      <div style={{background:"#fff",padding:"52px 20px 18px",borderBottom:"1px solid #E5E5EA"}}>
        <p style={{color:"#8E8E93",fontSize:11,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",margin:"0 0 3px"}}>Finanzas personales</p>
        <h1 style={{color:"#1C1C1E",fontSize:28,fontWeight:800,margin:0,letterSpacing:-0.3}}>Resumen</h1>
      </div>

      <div style={{padding:"16px"}}>

        {/* ── Ingreso mensual ── */}
        <div style={{background:"#fff",borderRadius:18,overflow:"hidden",marginBottom:14,
          boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #F2F2F7",
            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{color:"#8E8E93",fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 2px"}}>Ingreso mensual</p>
              {editingIncome?(
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                  <input autoFocus style={{border:"none",outline:"none",fontSize:22,fontWeight:800,
                    color:"#34C759",fontFamily:"inherit",background:"transparent",width:160,
                    WebkitAppearance:"none"}}
                    type="number" placeholder="0.00" value={incomeInput}
                    onChange={e=>setIncomeInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&saveIncome()}/>
                  <button onClick={saveIncome}
                    style={{background:"#34C759",color:"#fff",border:"none",borderRadius:10,
                      padding:"6px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>OK</button>
                </div>
              ):(
                <p style={{color:"#34C759",fontSize:24,fontWeight:800,margin:0,letterSpacing:-0.5}}>
                  {eff_income>0?MX(eff_income):"No definido"}
                </p>
              )}
            </div>
            {!editingIncome&&(
              <button onClick={()=>{setIncomeInput(income||"");setEditingIncome(true);}}
                style={{background:"#F2F2F7",border:"none",borderRadius:10,padding:"7px 14px",
                  fontSize:13,fontWeight:600,color:"#636366",cursor:"pointer"}}>
                {eff_income>0?"Editar":"+ Agregar"}
              </button>
            )}
          </div>

          {/* ¿Alcanza? banner */}
          {eff_income>0&&(
            <div style={{padding:"14px 16px",background:alcanza?"rgba(52,199,89,0.06)":"rgba(255,59,48,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <p style={{color:alcanza?"#34C759":"#FF3B30",fontSize:13,fontWeight:700,margin:"0 0 2px"}}>
                    {alcanza?"✅ Sí alcanza":"❌ No alcanza"}
                  </p>
                  <p style={{color:"#8E8E93",fontSize:12,margin:0}}>
                    {alcanza
                      ? `Te sobran ${MX(margen)} este mes`
                      : `Te faltan ${MX(Math.abs(margen))} para cubrir todo`}
                  </p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{color:"#8E8E93",fontSize:11,margin:"0 0 1px"}}>Comprometido</p>
                  <p style={{color:pctUsed>90?"#FF3B30":pctUsed>70?"#FF9F0A":"#1C1C1E",
                    fontSize:18,fontWeight:800,margin:0}}>{pctUsed.toFixed(0)}%</p>
                </div>
              </div>
              {/* Barra ingreso vs gasto */}
              <div style={{background:"#E5E5EA",borderRadius:99,height:8,overflow:"hidden"}}>
                <div style={{width:`${pctUsed}%`,height:"100%",borderRadius:99,
                  background:pctUsed>90?"#FF3B30":pctUsed>70?"#FF9F0A":"#34C759",
                  transition:"width 0.6s ease"}}/>
              </div>
              {/* Desglose */}
              <div style={{display:"flex",gap:8,marginTop:12}}>
                {[
                  {l:"Tarjetas",v:cur.expenses+cur.msi,c:"#007AFF"},
                  {l:"Compromisos",v:cur.debts,c:"#32ADE6"},
                  {l:"Margen",v:margen,c:margen>=0?"#34C759":"#FF3B30"},
                ].map(s=>(
                  <div key={s.l} style={{flex:1,background:"rgba(0,0,0,0.04)",borderRadius:10,padding:"8px 10px"}}>
                    <p style={{color:"#8E8E93",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,margin:"0 0 2px"}}>{s.l}</p>
                    <p style={{color:s.c,fontSize:13,fontWeight:800,margin:0}}>{MX(s.v)}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── Gráfica de barras últimos 6 meses ── */}
        <div style={{background:"#fff",borderRadius:18,padding:"16px",marginBottom:14,
          boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <p style={{color:"#1C1C1E",fontSize:15,fontWeight:700,margin:"0 0 2px"}}>Gasto mensual</p>
              <p style={{color:"#8E8E93",fontSize:12,margin:0}}>
                {trend>0?`↑ ${MX(trend)} vs mes anterior`:trend<0?`↓ ${MX(Math.abs(trend))} vs mes anterior`:"Sin cambio"}
              </p>
            </div>
            {/* Leyenda */}
            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {[{c:"#007AFF",l:"Gastos"},{c:"#AF52DE",l:"MSI"},{c:"#32ADE6",l:"Compromisos"}].map(i=>(
                <div key={i.l} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:8,height:8,borderRadius:2,background:i.c,flexShrink:0}}/>
                  <span style={{color:"#8E8E93",fontSize:10}}>{i.l}</span>
                </div>
              ))}
            </div>
          </div>

          {/* SVG bar chart */}
          <div style={{overflowX:"auto"}}>
            <svg width="100%" viewBox={`0 0 ${months.length*56} ${BAR_H+40}`}
              style={{display:"block",minWidth:280}}>
              {histData.map((d,i)=>{
                const x     = i*56+6;
                const bw    = 44;
                const scale = v => BAR_H * (v/maxVal);
                const eH    = scale(d.expenses);
                const mH    = scale(d.msi);
                const dH    = scale(d.debts);
                const totalH= eH+mH+dH;
                const isNow = d.ym===currentYM;
                return(
                  <g key={d.ym}>
                    {/* income line marker */}
                    {eff_income>0&&i===months.length-1&&(
                      <line x1={x} y1={BAR_H-scale(eff_income)} x2={x+bw} y2={BAR_H-scale(eff_income)}
                        stroke="#34C759" strokeWidth="1.5" strokeDasharray="3,2"/>
                    )}
                    {/* stacked bars */}
                    {d.debts>0&&<rect x={x} y={BAR_H-totalH} width={bw} height={dH} rx="0" fill="#32ADE6" opacity="0.85"/>}
                    {d.msi>0&&<rect x={x} y={BAR_H-eH-mH} width={bw} height={mH} rx="0" fill="#AF52DE" opacity="0.85"/>}
                    {d.expenses>0&&<rect x={x} y={BAR_H-eH} width={bw} height={eH} rx="3" fill="#007AFF" opacity="0.85"/>}
                    {/* empty bar placeholder */}
                    {totalH===0&&<rect x={x} y={BAR_H-3} width={bw} height={3} rx="1.5" fill="#E5E5EA"/>}
                    {/* month label */}
                    <text x={x+bw/2} y={BAR_H+14} textAnchor="middle"
                      fill={isNow?"#007AFF":"#8E8E93"} fontSize="10" fontWeight={isNow?"700":"500"}>
                      {d.label}
                    </text>
                    {/* total label on top */}
                    {totalH>12&&(
                      <text x={x+bw/2} y={BAR_H-totalH-4} textAnchor="middle"
                        fill="#636366" fontSize="9" fontWeight="600">
                        {(d.total/1000).toFixed(1)}k
                      </text>
                    )}
                    {/* current month highlight */}
                    {isNow&&<rect x={x} y={BAR_H+18} width={bw} height={2} rx="1" fill="#007AFF"/>}
                  </g>
                );
              })}
              {/* income global dashed line */}
              {eff_income>0&&(
                <line x1="0" y1={BAR_H-BAR_H*(eff_income/maxVal)}
                  x2={months.length*56} y2={BAR_H-BAR_H*(eff_income/maxVal)}
                  stroke="#34C759" strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
              )}
            </svg>
          </div>
        </div>

        {/* ── Tabla mensual detallada ── */}
        <div style={{background:"#fff",borderRadius:18,overflow:"hidden",marginBottom:14,
          boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #F2F2F7"}}>
            <p style={{color:"#1C1C1E",fontSize:15,fontWeight:700,margin:0}}>Detalle por mes</p>
          </div>
          {[...histData].reverse().map((d,i,arr)=>{
            const hasData = d.total>0;
            return(
              <div key={d.ym} style={{padding:"12px 16px",
                borderBottom:i<arr.length-1?"1px solid #F2F2F7":"none",
                background:d.ym===currentYM?"rgba(0,122,255,0.03)":"transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:hasData?6:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <p style={{color:d.ym===currentYM?"#007AFF":"#1C1C1E",fontSize:14,fontWeight:600,margin:0}}>
                      {monthLabel(d.ym)}
                    </p>
                    {d.ym===currentYM&&<span style={{fontSize:9,fontWeight:700,color:"#007AFF",background:"rgba(0,122,255,0.1)",borderRadius:4,padding:"1px 5px"}}>HOY</span>}
                  </div>
                  <p style={{color:hasData?"#1C1C1E":"#C7C7CC",fontSize:15,fontWeight:700,margin:0}}>
                    {hasData?MX(d.total):"Sin datos"}
                  </p>
                </div>
                {hasData&&(
                  <div style={{display:"flex",gap:6}}>
                    {d.expenses>0&&<span style={{fontSize:10,color:"#007AFF",background:"rgba(0,122,255,0.08)",borderRadius:5,padding:"1px 6px",fontWeight:600}}>G {MX(d.expenses)}</span>}
                    {d.msi>0&&<span style={{fontSize:10,color:"#AF52DE",background:"rgba(175,82,222,0.08)",borderRadius:5,padding:"1px 6px",fontWeight:600}}>MSI {MX(d.msi)}</span>}
                    {d.debts>0&&<span style={{fontSize:10,color:"#32ADE6",background:"rgba(50,173,230,0.08)",borderRadius:5,padding:"1px 6px",fontWeight:600}}>C {MX(d.debts)}</span>}
                    {(d.income||eff_income)>0&&<span style={{fontSize:10,color:"#34C759",background:"rgba(52,199,89,0.08)",borderRadius:5,padding:"1px 6px",fontWeight:600}}>↑ {MX(d.income||eff_income)}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>

      </div>
    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────────
function BottomNav({active,onChange,debtAlert}){
  const tabs=[
    {id:"cards",   icon:"💳", label:"Tarjetas"},
    {id:"debts",   icon:"📅", label:"Compromisos", alert:debtAlert},
    {id:"resumen", icon:"📊", label:"Resumen"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,
      background:"rgba(255,255,255,0.94)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
      borderTop:"0.5px solid rgba(0,0,0,0.1)",display:"flex",
      paddingBottom:"env(safe-area-inset-bottom,14px)"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>onChange(t.id)}
          style={{flex:1,padding:"11px 0 8px",background:"none",border:"none",cursor:"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
          <span style={{fontSize:22,lineHeight:1,filter:active===t.id?"none":"grayscale(1) opacity(0.4)"}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:700,color:active===t.id?"#007AFF":"#8E8E93"}}>{t.label}</span>
          {(t.alert||0)>0&&(
            <span style={{position:"absolute",top:7,right:"calc(50% - 20px)",background:"#FF3B30",color:"#fff",
              fontSize:10,fontWeight:800,borderRadius:99,minWidth:17,height:17,
              display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>
              {t.alert}
            </span>
          )}
        </button>
      ))}
    </div>
  );
}

// ─── HOME / DASHBOARD ─────────────────────────────────────
function App(){
  const [cards,setCards]         = useLS("fn3_cards",[]);
  const [debts,setDebts]         = useLS("fn3_debts",[]);
  const [history,setHistory]     = useLS("fn3_history",{});   // {ym: {expenses,msi,debts,income}}
  const [income,setIncome]       = useLS("fn3_income",0);     // ingreso mensual
  const [selected,setSelected]   = useState(null);
  const [showNewCard,setNewCard]  = useState(false);
  const [screen,setScreen]       = useState("cards");

  const updateCard = u=>{setCards(prev=>prev.map(c=>c.id===u.id?u:c));setSelected(u);};
  const deleteCard = id=>{setCards(prev=>prev.filter(c=>c.id!==id));setSelected(null);};
  const addCard    = data=>{setCards(prev=>[...prev,{id:Date.now(),expenses:[],deferred:[],...data}]);setNewCard(false);};

  const saveDebt      = data=>setDebts(prev=>{const e=prev.find(d=>d.id===data.id);return e?prev.map(d=>d.id===data.id?data:d):[...prev,data];});
  const deleteDebt    = id=>setDebts(prev=>prev.filter(d=>d.id!==id));
  const toggleDebtPaid= (debtId,ym)=>setDebts(prev=>prev.map(d=>{
    if(d.id!==debtId) return d;
    if(!d.recurring&&d.yearMonth===ym) return{...d,paid:!d.paid};
    const pm={...(d.paidMonths||{})};pm[ym]=!pm[ym];return{...d,paidMonths:pm};
  }));

  function debtAppearsIn(debt,ym){
    if(!debt.recurring) return debt.yearMonth===ym;
    const[sy,sm]=debt.yearMonth.split("-").map(Number);
    const[ty,tm]=ym.split("-").map(Number);
    const off=(ty*12+tm)-(sy*12+sm);
    if(off<0) return false;
    if(debt.recurMonths&&off>=debt.recurMonths) return false;
    return true;
  }
  const currentYM = monthKey(0);
  const debtAlert = debts.filter(d=>{
    if(!debtAppearsIn(d,currentYM)) return false;
    return!(d.paidMonths?.[currentYM]||(currentYM===d.yearMonth&&d.paid));
  }).length;

  if(selected){
    const live=cards.find(c=>c.id===selected.id)||selected;
    return <CardDetail card={live} onBack={()=>setSelected(null)} onUpdate={updateCard} onDelete={deleteCard}/>;
  }
  if(screen==="debts"){
    return(
      <>
        <DebtsView debts={debts} onAdd={saveDebt} onDelete={deleteDebt} onTogglePaid={toggleDebtPaid}/>
        <BottomNav active="debts" onChange={s=>setScreen(s)} debtAlert={debtAlert}/>
      </>
    );
  }
  if(screen==="resumen"){
    return(
      <>
        <ResumenView history={history} income={income} onSetIncome={setIncome}
          cards={cards} debts={debts} currentYM={currentYM}/>
        <BottomNav active="resumen" onChange={s=>setScreen(s)} debtAlert={debtAlert}/>
      </>
    );
  }

  // ── Snapshot del mes actual al historial ──
  useEffect(()=>{
    if(!cards.length) return;
    const ym = currentMonthKey();
    const exp = cards.reduce((s,c)=>s+(c.expenses||[]).filter(e=>getCycleLabel(e.date,c.cutDay)==="current").reduce((a,e)=>a+e.amount,0),0);
    const msi = cards.reduce((s,c)=>s+(c.deferred||[]).filter(d=>!msiIsFullyPaid(d)).reduce((a,d)=>a+d.monthlyAmt,0),0);
    const dbt = debts.filter(d=>{
      if(!d.recurring) return d.yearMonth===ym;
      const[sy,sm]=d.yearMonth.split("-").map(Number);
      const[ty,tm]=ym.split("-").map(Number);
      const off=(ty*12+tm)-(sy*12+sm);
      return off>=0&&(!d.recurMonths||off<d.recurMonths);
    }).reduce((s,d)=>s+d.amount,0);
    setHistory(prev=>({...prev,[ym]:{expenses:exp,msi,debts:dbt,income}}));
  },[cards,debts,income]);

  const totalLimit = cards.reduce((s,c)=>s+c.limit+(c.limitExt||0),0);
  const totalAvail = cards.reduce((s,c)=>{
    const g=(c.expenses||[]).filter(e=>!e.paid&&getCycleLabel(e.date,c.cutDay)==="current"&&!e.alreadyInBalance).reduce((a,e)=>a+e.amount,0);
    const m=(c.deferred||[]).filter(d=>!msiIsFullyPaid(d)&&!d.alreadyInBalance).reduce((a,d)=>a+d.monthlyAmt,0);
    return s+(c.available||0)-g-m;
  },0);
  const totalPayThisCut = cards.reduce((s,c)=>{
    const g=(c.expenses||[]).filter(e=>!e.paid&&getCycleLabel(e.date,c.cutDay)==="current").reduce((a,e)=>a+e.amount,0);
    const m=(c.deferred||[]).filter(d=>!msiIsFullyPaid(d)).reduce((a,d)=>a+d.monthlyAmt,0);
    return s+g+m;
  },0);
  const score     = healthScore(cards);
  const allAlerts = cards.flatMap(c=>(c.deferred||[]).filter(d=>!msiIsFullyPaid(d)&&msiPaidCount(d)===d.totalInstall-1).map(d=>({...d,cardName:c.name})));
  const soonCards = cards.filter(c=>daysUntilPay(c.payDay||c.cutDay)<=5);
  const debtsDueNow   = debts.filter(d=>debtAppearsIn(d,currentYM));
  const debtsDueTotal = debtsDueNow.reduce((s,d)=>{const p=d.paidMonths?.[currentYM]||(currentYM===d.yearMonth&&d.paid);return s+(p?0:d.amount);},0);

  return(
    <div style={{minHeight:"100vh",background:"#F2F2F7",fontFamily:"'SF Pro Text',-apple-system,BlinkMacSystemFont,sans-serif"}}>

      <div style={{background:"#fff",padding:"56px 20px 16px",borderBottom:"0.5px solid #E5E5EA"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:cards.length?18:0}}>
          <div>
            <p style={{color:"#8E8E93",fontSize:11,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",margin:"0 0 3px"}}>Finanzas personales</p>
            <h1 style={{color:"#1C1C1E",fontSize:32,fontWeight:800,margin:0,letterSpacing:-0.5}}>Mis Tarjetas</h1>
          </div>
          {cards.length>0&&<HealthRing score={score}/>}
        </div>
        {cards.length>0&&(
          <div style={{display:"flex",gap:8}}>
            {[
              {l:"DEUDA TOTAL",   v:MX(totalLimit-totalAvail),c:"#FF3B30"},
              {l:"DISPONIBLE",    v:MX(totalAvail),           c:"#34C759"},
              {l:"PAGAR ESTE MES",v:MX(totalPayThisCut),      c:"#FF9F0A"},
            ].map(s=>(
              <div key={s.l} style={{flex:1,background:"#F2F2F7",borderRadius:14,padding:"11px 12px"}}>
                <p style={{color:"#8E8E93",fontSize:9,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",margin:"0 0 3px"}}>{s.l}</p>
                <p style={{color:s.c,fontSize:14,fontWeight:800,margin:0}}>{s.v}</p>
              </div>
            ))}
          </div>
        )}
        {debtsDueTotal>0&&(
          <div onClick={()=>setScreen("debts")}
            style={{marginTop:12,background:"rgba(50,173,230,0.08)",border:"1px solid rgba(50,173,230,0.18)",borderRadius:14,padding:"11px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{color:"#32ADE6",fontSize:13,fontWeight:700,margin:"0 0 2px"}}>📅 Compromisos este mes</p>
              <p style={{color:"#636366",fontSize:12,margin:0}}>{debtAlert} pago{debtAlert!==1?"s":""} pendiente{debtAlert!==1?"s":""}</p>
            </div>
            <p style={{color:"#32ADE6",fontSize:16,fontWeight:800,margin:0}}>{MX(debtsDueTotal)}</p>
          </div>
        )}
        {soonCards.length>0&&(
          <div style={{marginTop:10,background:"rgba(255,59,48,0.06)",border:"1px solid rgba(255,59,48,0.14)",borderRadius:14,padding:"11px 14px"}}>
            <p style={{color:"#FF3B30",fontSize:12,fontWeight:700,margin:"0 0 4px"}}>⏰ Próximos pagos</p>
            {soonCards.map(c=><p key={c.id} style={{color:"#636366",fontSize:12,margin:"2px 0 0"}}><b style={{color:"#1C1C1E"}}>{c.name}</b> — día {c.payDay||c.cutDay}</p>)}
          </div>
        )}
        {allAlerts.length>0&&(
          <div style={{marginTop:10,background:"rgba(255,149,0,0.06)",border:"1px solid rgba(255,149,0,0.18)",borderRadius:14,padding:"11px 14px"}}>
            <p style={{color:"#FF9500",fontSize:12,fontWeight:700,margin:"0 0 4px"}}>🔁 Última cuota MSI</p>
            {allAlerts.map(d=><p key={d.id} style={{color:"#636366",fontSize:12,margin:"2px 0 0"}}><b style={{color:"#1C1C1E"}}>{d.cardName}</b>{d.desc?` · ${d.desc}`:""}</p>)}
          </div>
        )}
      </div>

      {/* CARDS LIST */}
      <div style={{padding:"16px 16px 120px"}}>
        {cards.length===0?(
          <div style={{textAlign:"center",padding:"80px 24px 0"}}>
            <p style={{fontSize:58,margin:"0 0 14px"}}>💳</p>
            <p style={{fontSize:20,fontWeight:700,color:"#3A3A3C",margin:"0 0 8px"}}>Sin tarjetas</p>
            <p style={{fontSize:14,color:"#8E8E93",lineHeight:1.6,margin:0}}>Toca + para agregar<br/>tu primera tarjeta</p>
          </div>
        ):cards.map((card,idx)=>{
          const theme = CARD_THEMES[card.themeIdx??0];
          const cut   = card.cutDay||1;
          const pay   = card.payDay||cut;
          const g     = (card.expenses||[]).filter(e=>!e.paid&&getCycleLabel(e.date,cut)==="current"&&!e.alreadyInBalance).reduce((s,e)=>s+e.amount,0);
          const m     = (card.deferred||[]).filter(d=>!msiIsFullyPaid(d)&&!d.alreadyInBalance).reduce((s,d)=>s+d.monthlyAmt,0);
          const avail = (card.available||0)-g-m;
          const lim   = card.limit+(card.limitExt||0);
          const toPay = (card.expenses||[]).filter(e=>!e.paid&&getCycleLabel(e.date,cut)==="current").reduce((s,e)=>s+e.amount,0)
                      + (card.deferred||[]).filter(d=>!msiIsFullyPaid(d)).reduce((s,d)=>s+d.monthlyAmt,0);
          const pct   = Math.min(100,Math.max(0,((lim-avail)/lim)*100));
          const barC  = pct>85?"#FF3B30":pct>65?"#FF9F0A":theme.bar;
          const daysPay=daysUntilPay(pay);
          const daysCut=daysUntilCut(cut);
          const activeMSI=(card.deferred||[]).filter(d=>!msiIsFullyPaid(d)).length;

          return(
            <div key={card.id} onClick={()=>setSelected(card)}
              style={{background:themeBg(theme),borderRadius:24,padding:"20px 20px 16px",marginBottom:14,
                cursor:"pointer",position:"relative",overflow:"hidden",
                boxShadow:`0 8px 28px ${theme.bg[0]}55, 0 2px 8px rgba(0,0,0,0.1)`,
                animation:`fadeUp 0.32s ease ${idx*0.07}s both`}}>
              <div style={{position:"absolute",right:-50,top:-50,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,0.06)",pointerEvents:"none"}}/>
              <div style={{position:"absolute",left:-30,bottom:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.04)",pointerEvents:"none"}}/>
              <div style={{position:"absolute",top:18,right:18,opacity:0.25}}>
                <svg width="30" height="22" viewBox="0 0 30 22" fill="none">
                  <rect x="0" y="3" width="30" height="16" rx="3" fill="rgba(255,255,255,0.7)"/>
                  <rect x="9" y="0" width="12" height="22" rx="2" fill="rgba(255,255,255,0.5)"/>
                  <rect x="0" y="8" width="30" height="6" fill="rgba(255,255,255,0.4)"/>
                </svg>
              </div>

              {/* Card name */}
              <h3 style={{color:"#fff",fontSize:20,fontWeight:800,margin:"0 0 12px",letterSpacing:-0.2,position:"relative",zIndex:1}}>{card.name}</h3>

              {/* A PAGAR — protagonista */}
              <p style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,letterSpacing:0.6,textTransform:"uppercase",margin:"0 0 2px",position:"relative",zIndex:1}}>A pagar este ciclo</p>
              <p style={{color:toPay>0?"#FF453A":"#30D158",fontSize:26,fontWeight:800,margin:"0 0 2px",letterSpacing:-0.5,position:"relative",zIndex:1}}>{MX(toPay)}</p>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,margin:"0 0 12px",position:"relative",zIndex:1}}>
                Disponible: <span style={{color:avail<0?"#FF453A":theme.bar,fontWeight:700}}>{MX(avail)}</span>
              </p>

              {/* Usage bar */}
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:99,height:4,marginBottom:10,position:"relative",zIndex:1}}>
                <div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:barC,transition:"width 0.6s ease"}}/>
              </div>

              {/* Bottom info */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:1}}>
                <div style={{display:"flex",gap:10}}>
                  <span style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>✂️{cut}<span style={{color:daysCut<=3?"#FF453A":theme.bar,marginLeft:2}}>{daysCut===0?"¡hoy!":`en ${daysCut}d`}</span></span>
                  <span style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>💳{pay}<span style={{color:daysPay<=5?"#FF453A":theme.bar,marginLeft:2}}>{daysPay===0?"¡hoy!":`en ${daysPay}d`}</span></span>
                </div>
                {activeMSI>0&&(
                  <span style={{color:theme.bar,fontSize:10,background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"2px 8px",fontWeight:700}}>
                    {activeMSI} MSI activo{activeMSI!==1?"s":""}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <button onClick={()=>setNewCard(true)}
        style={{position:"fixed",bottom:82,right:20,width:56,height:56,borderRadius:28,
          background:"#007AFF",border:"none",color:"#fff",fontSize:30,cursor:"pointer",lineHeight:1,
          zIndex:100,boxShadow:"0 6px 24px rgba(0,122,255,0.45)",display:"flex",alignItems:"center",
          justifyContent:"center",transition:"transform 0.12s"}}
        onMouseDown={e=>e.currentTarget.style.transform="scale(0.88)"}
        onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>+</button>

      <BottomNav active="cards" onChange={s=>setScreen(s)} debtAlert={debtAlert}/>
      {showNewCard&&<CardForm onSave={addCard} onClose={()=>setNewCard(false)}/>}

      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        input[type=date]::-webkit-calendar-picker-indicator{opacity:0.4}
        input[type=month]::-webkit-calendar-picker-indicator{opacity:0.4}
        select option{background:#fff;color:#1C1C1E}
        *{-webkit-tap-highlight-color:transparent}
        ::-webkit-scrollbar{display:none}
        input::placeholder{color:#C7C7CC}
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
